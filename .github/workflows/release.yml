name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version strings match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"
          node scripts/check-release-versions.mjs "$TAG_VERSION"

  preflight:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
      - name: Check docs generator conformance
        run: node scripts/check-docs-generator.mjs
      - name: Check documentation examples
        run: node scripts/check-doc-examples.mjs
      - name: Check URL conventions
        run: node scripts/check-url-conventions.mjs
      - name: Check agent surface integrity
        run: node scripts/check-agent-surfaces.mjs
      - name: Test JavaScript package
        working-directory: js
        run: npm test
      - name: Check JavaScript package metadata
        working-directory: js
        run: npm pack --dry-run
      - name: Smoke test packed JavaScript package
        working-directory: js
        run: |
          PACKAGE_FILE="$(npm pack --silent --pack-destination "$RUNNER_TEMP")"
          mkdir "$RUNNER_TEMP/hardguard25-npm-smoke"
          cd "$RUNNER_TEMP/hardguard25-npm-smoke"
          npm init -y >/dev/null
          npm install --ignore-scripts "$RUNNER_TEMP/$PACKAGE_FILE" >/dev/null
          node --input-type=module -e "import('hardguard25').then((m) => { if (m.checkDigit('AC3H7PUW') !== 'N') process.exit(1); })"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python build dependencies
        run: python -m pip install pytest build
      - name: Test Python package
        working-directory: python
        run: python -m pytest
      - name: Check Python package build
        working-directory: python
        run: python -m build
      - name: Smoke test built Python wheel
        working-directory: python
        run: |
          python -m venv "$RUNNER_TEMP/hardguard25-wheel-smoke"
          "$RUNNER_TEMP/hardguard25-wheel-smoke/bin/python" -m pip install --no-deps dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/hardguard25-wheel-smoke/bin/python" -c "import importlib.metadata, hardguard25; assert importlib.metadata.version('hardguard25') == hardguard25.__version__; assert hardguard25.check_digit('AC3H7PUW') == 'N'"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test Go package
        working-directory: go
        run: GOCACHE="${{ github.workspace }}/.gocache" go test ./...

  publish-npm:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm for OIDC trusted publishing
        run: npm install -g npm@11.5.1
      - name: Publish to npm (trusted publishing, no token)
        working-directory: js
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "hardguard25@$VERSION" version >/dev/null 2>&1; then
            echo "hardguard25@$VERSION already exists; skipping"
          else
            npm publish
          fi

  publish-pypi:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test
        run: |
          python -m pip install pytest build
          cd python && python -m pytest
      - name: Build
        working-directory: python
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  tag-go:
    needs: [publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Tag Go submodule
        run: |
          GO_TAG="go/${GITHUB_REF_NAME}"
          if git ls-remote --exit-code --tags origin "refs/tags/$GO_TAG" >/dev/null 2>&1; then
            echo "$GO_TAG already exists, skipping"
            exit 0
          fi
          git tag "$GO_TAG" "$GITHUB_SHA"
          git push origin "$GO_TAG"
